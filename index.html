<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>나만의 AI 레시피 노트</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🍳 나만의 AI 레시피 노트</h1>

<input id="search" placeholder="레시피 검색" oninput="searchRecipe()">

<div class="form">

<input id="title" placeholder="레시피 이름">

<select id="category">
<option>한식</option>
<option>양식</option>
<option>디저트</option>
<option>기타</option>
</select>

<input id="tags" placeholder="태그 (예: 간단요리, 다이어트)">

<input id="time" placeholder="요리 시간 (예: 20분)">

<select id="level">
<option>쉬움</option>
<option>보통</option>
<option>어려움</option>
</select>

<textarea id="steps" placeholder="요리 순서 (줄바꿈으로 구분)"></textarea>

<textarea id="content" placeholder="레시피 설명"></textarea>

<button onclick="saveRecipe()">레시피 저장</button>

</div>

<hr>

<h2>🔗 레시피 URL 자동 정리</h2>

<input id="recipeUrl" placeholder="블로그 레시피 URL 붙여넣기">

<button onclick="extractRecipe()">AI 레시피 추출</button>

<pre id="urlResult"></pre>

<hr>

<h2>📖 내 레시피</h2>

<div id="recipeList"></div>

<script src="script.js"></script>

</body>
</html>
